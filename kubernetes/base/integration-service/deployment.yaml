apiVersion: apps/v1
kind: Deployment

metadata:
  name: integration-service
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    version: v1
    app: integration-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: integration-service

  template:
    metadata:
      labels:
        version: v1
        app: integration-service

    spec:
      containers:
        - name: integration-service
          image: kdmodder/integration-service:1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8088

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "512Mi"

          