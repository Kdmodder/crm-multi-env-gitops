apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: discovery-server-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: discovery-server

  minReplicas: 1
  maxReplicas: 2

  metrics:
  - type: Resource
    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70
