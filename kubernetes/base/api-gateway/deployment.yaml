apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    version: v1
    app: api-gateway

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        version: v1
        app: api-gateway

    spec:
      containers:
      - name: api-gateway
        image: kdmodder/api-gateway:1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
