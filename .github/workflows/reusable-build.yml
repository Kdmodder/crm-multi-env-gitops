name: Reusable Service Build

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

      service_path:
        required: true
        type: string

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        run: |
          VERSION=$(cat ${{ inputs.service_path }}/version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > ${{ inputs.service_path }}/version.txt

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ inputs.service_path }}/Dockerfile \
            -t kdmodder/${{ inputs.service }}:${NEW_VERSION} \
            .

      - name: Push Docker image
        run: |
          docker push kdmodder/${{ inputs.service }}:${NEW_VERSION}

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ${{ inputs.service_path }}/version.txt

          git commit -m "[skip ci] chore(${{ inputs.service }}): bump version to ${NEW_VERSION}" || exit 0

          git push
