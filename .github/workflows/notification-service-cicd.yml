name: notification-service CI/CD

permissions:
  contents: write

on:
  push:
    branches:
      - staging
    paths:
      - 'notification-service/**'

  workflow_dispatch:

jobs:
  notification-service:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read current version
        run: |
          VERSION=$(cat notification-service/version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > notification-service/version.txt

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          echo "Old Version: $VERSION"
          echo "New Version: $NEW_VERSION"

      - name: Build Docker image
        run: |
          docker build             -f notification-service/Dockerfile             -t kdmodder/notification-service:${NEW_VERSION}             .

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login             -u "${{ secrets.DOCKER_USERNAME }}"             --password-stdin

      - name: Push Docker image
        run: |
          docker push kdmodder/notification-service:${NEW_VERSION}

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add notification-service/version.txt

          git commit -m "[skip ci] chore(notification-service): bump version to ${NEW_VERSION}" || exit 0

          git push
