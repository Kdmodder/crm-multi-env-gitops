services:

  mysql:
    image: mysql:8
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: srivilliamsai

    ports:
      - "3306:3306"

    networks:
      - crm-network

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile

    container_name: discovery-server

    ports:
      - "8761:8761"

    networks:
      - crm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile

    container_name: api-gateway

    ports:
      - "8080:8080"

    depends_on:
      - discovery-server

    networks:
      - crm-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile

    container_name: auth-service

    ports:
      - "8081:8081"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile

    container_name: customer-service

    ports:
      - "8082:8082"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  sales-service:
    build:
      context: .
      dockerfile: sales-service/Dockerfile

    container_name: sales-service

    ports:
      - "8083:8083"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  marketing-service:
    build:
      context: .
      dockerfile: marketing-service/Dockerfile

    container_name: marketing-service

    ports:
      - "8084:8084"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  support-service:
    build:
      context: .
      dockerfile: support-service/Dockerfile

    container_name: support-service

    ports:
      - "8085:8085"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile

    container_name: analytics-service

    ports:
      - "8086:8086"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  workflow-service:
    build:
      context: .
      dockerfile: workflow-service/Dockerfile

    container_name: workflow-service

    ports:
      - "8087:8087"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  integration-service:
    build:
      context: .
      dockerfile: integration-service/Dockerfile

    container_name: integration-service

    ports:
      - "8088:8088"

    depends_on:
      - discovery-server

    networks:
      - crm-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile

    container_name: notification-service

    ports:
      - "8089:8089"

    depends_on:
      - mysql
      - discovery-server

    networks:
      - crm-network

  crm-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: crm-frontend

    ports:
      - "3000:3000"

    depends_on:
      - api-gateway

    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge
